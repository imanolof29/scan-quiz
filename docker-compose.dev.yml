services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - /app/node_modules
    command: npm run start:dev

  postgres:
    image: postgres:16-alpine
    container_name: scanquiz_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: scanquiz
      POSTGRES_PASSWORD: scanquiz_pass
      POSTGRES_DB: scanquiz_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: scanquiz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: